<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumping Stick Animation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 400px;
            height: 400px;
        }

        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.5);
        }

        .stick {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 120px;
            background: linear-gradient(to right, #ff6b6b, #c92a2a, #ff6b6b);
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: jump 1s ease-in-out infinite;
        }

        .stick::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #ffd43b, #fab005);
            border-radius: 50%;
        }

        .stick::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background: radial-gradient(circle at 30% 30%, #ffd43b, #fab005);
            border-radius: 50%;
        }

        @keyframes jump {
            0%, 100% {
                bottom: 0;
                animation-timing-function: ease-in;
            }
            50% {
                bottom: 300px;
                animation-timing-function: ease-out;
            }
        }

        .shadow {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50%;
            filter: blur(5px);
            animation: shadow 1s ease-in-out infinite;
        }

        @keyframes shadow {
            0%, 100% {
                width: 50px;
                opacity: 0.5;
            }
            50% {
                width: 20px;
                opacity: 0.2;
            }
        }

        h1 {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: 'Arial', sans-serif;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <h1>Jumping Stick</h1>
    <div class="container">
        <div class="shadow"></div>
        <div class="stick"></div>
        <div class="ground"></div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird with Webcam</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            font-family: 'Arial', sans-serif;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
        }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        #webcamVideo {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 120px;
            height: 90px;
            border: 3px solid white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            z-index: 2;
            transform: scaleX(-1); /* Mirror the video */
            background: #000;
        }
        
        #controls {
            margin-top: 20px;
            text-align: center;
        }
        
        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        button:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .info {
            margin-top: 10px;
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🐦 Flappy Bird with Webcam 📹</h1>
    
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <video id="webcamVideo" autoplay playsinline muted></video>
    </div>
    
    <div id="controls">
        <button id="startWebcam">Start Webcam</button>
        <button id="toggleWebcam" style="display:none;">Hide Webcam</button>
        <div class="info">
            <p><strong>Controls:</strong> Press SPACE or click to flap</p>
            <p>ESC to restart game</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('webcamVideo');
        const startWebcamBtn = document.getElementById('startWebcam');
        const toggleWebcamBtn = document.getElementById('toggleWebcam');
        
        let webcamStream = null;
        let webcamVisible = true;
        
        // Game constants
        const GRAVITY = 0.5;
        const FLAP_STRENGTH = -10;
        const PIPE_SPEED = 3;
        const PIPE_GAP = 200;
        const PIPE_FREQUENCY = 90;
        
        // Game state
        let bird = {
            x: 100,
            y: canvas.height / 2,
            velocity: 0,
            radius: 12
        };
        
        let pipes = [];
        let frameCount = 0;
        let score = 0;
        let gameOver = false;
        let started = false;
        let animationId = null;
        
        // Webcam functionality
        async function startWebcam() {
            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: 320, 
                        height: 240,
                        facingMode: 'user'
                    }, 
                    audio: false 
                });
                video.srcObject = webcamStream;
                video.style.display = 'block';
                startWebcamBtn.style.display = 'none';
                toggleWebcamBtn.style.display = 'inline-block';
                webcamVisible = true;
            } catch (err) {
                console.error('Error accessing webcam:', err);
                alert('Unable to access webcam. Please ensure you have granted camera permissions.');
            }
        }
        
        function toggleWebcam() {
            webcamVisible = !webcamVisible;
            video.style.display = webcamVisible ? 'block' : 'none';
            toggleWebcamBtn.textContent = webcamVisible ? 'Hide Webcam' : 'Show Webcam';
        }
        
        startWebcamBtn.addEventListener('click', startWebcam);
        toggleWebcamBtn.addEventListener('click', toggleWebcam);
        
        // Bird class
        function drawBird() {
            // Body
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + 5, bird.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Beak
            ctx.fillStyle = '#FF0000';
            ctx.beginPath();
            ctx.moveTo(bird.x + 12, bird.y);
            ctx.lineTo(bird.x + 20, bird.y);
            ctx.lineTo(bird.x + 12, bird.y + 5);
            ctx.closePath();
            ctx.fill();
        }
        
        function updateBird() {
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;
        }
        
        function flap() {
            if (!gameOver) {
                bird.velocity = FLAP_STRENGTH;
                started = true;
            } else {
                resetGame();
            }
        }
        
        // Pipe class
        function createPipe(x) {
            return {
                x: x,
                width: 60,
                gapY: Math.random() * (canvas.height - 300) + 150,
                scored: false
            };
        }
        
        function drawPipe(pipe) {
            ctx.fillStyle = '#228B22';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            
            // Top pipe
            ctx.fillRect(pipe.x, 0, pipe.width, pipe.gapY);
            ctx.strokeRect(pipe.x, 0, pipe.width, pipe.gapY);
            
            // Top pipe cap
            ctx.fillRect(pipe.x - 5, pipe.gapY - 20, pipe.width + 10, 20);
            ctx.strokeRect(pipe.x - 5, pipe.gapY - 20, pipe.width + 10, 20);
            
            // Bottom pipe
            const bottomY = pipe.gapY + PIPE_GAP;
            ctx.fillRect(pipe.x, bottomY, pipe.width, canvas.height - bottomY);
            ctx.strokeRect(pipe.x, bottomY, pipe.width, canvas.height - bottomY);
            
            // Bottom pipe cap
            ctx.fillRect(pipe.x - 5, bottomY, pipe.width + 10, 20);
            ctx.strokeRect(pipe.x - 5, bottomY, pipe.width + 10, 20);
        }
        
        function updatePipe(pipe) {
            pipe.x -= PIPE_SPEED;
        }
        
        function checkCollision(pipe) {
            // Bird bounds
            const birdLeft = bird.x - bird.radius;
            const birdRight = bird.x + bird.radius;
            const birdTop = bird.y - bird.radius;
            const birdBottom = bird.y + bird.radius;
            
            // Pipe bounds
            const pipeLeft = pipe.x;
            const pipeRight = pipe.x + pipe.width;
            
            // Check if bird is within pipe's x range
            if (birdRight > pipeLeft && birdLeft < pipeRight) {
                // Check if bird hits top or bottom pipe
                if (birdTop < pipe.gapY || birdBottom > pipe.gapY + PIPE_GAP) {
                    return true;
                }
            }
            return false;
        }
        
        // Game functions
        function resetGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            pipes = [];
            frameCount = 0;
            score = 0;
            gameOver = false;
            started = false;
        }
        
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#E0F6FF');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ground
            ctx.fillStyle = '#228B22';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 50);
            ctx.lineTo(canvas.width, canvas.height - 50);
            ctx.stroke();
        }
        
        function drawScore() {
            ctx.fillStyle = '#000';
            ctx.font = 'bold 32px Arial';
            ctx.fillText(`Score: ${score}`, 10, 40);
        }
        
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#FF0000';
            ctx.font = 'bold 64px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 50);
            
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 24px Arial';
            ctx.fillText('Press SPACE or Click to Restart', canvas.width / 2, canvas.height / 2 + 20);
            ctx.textAlign = 'left';
        }
        
        function drawStartScreen() {
            ctx.fillStyle = '#000';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Press SPACE or Click to Start', canvas.width / 2, canvas.height / 2);
            ctx.textAlign = 'left';
        }
        
        function gameLoop() {
            // Draw background
            drawBackground();
            
            // Update and draw game elements
            if (started && !gameOver) {
                updateBird();
                
                // Check boundaries
                if (bird.y > canvas.height - 50 - bird.radius || bird.y < bird.radius) {
                    gameOver = true;
                }
                
                // Manage pipes
                frameCount++;
                if (frameCount % PIPE_FREQUENCY === 0) {
                    pipes.push(createPipe(canvas.width));
                }
                
                // Update pipes
                for (let i = pipes.length - 1; i >= 0; i--) {
                    const pipe = pipes[i];
                    updatePipe(pipe);
                    drawPipe(pipe);
                    
                    // Check collision
                    if (checkCollision(pipe)) {
                        gameOver = true;
                    }
                    
                    // Update score
                    if (!pipe.scored && pipe.x + pipe.width < bird.x) {
                        pipe.scored = true;
                        score++;
                    }
                    
                    // Remove off-screen pipes
                    if (pipe.x + pipe.width < 0) {
                        pipes.splice(i, 1);
                    }
                }
            } else {
                // Draw pipes without updating
                pipes.forEach(drawPipe);
            }
            
            // Draw bird
            drawBird();
            
            // Draw score
            drawScore();
            
            // Draw start or game over screen
            if (!started) {
                drawStartScreen();
            } else if (gameOver) {
                drawGameOver();
            }
            
            // Continue game loop
            animationId = requestAnimationFrame(gameLoop);
        }
        
        // Event listeners
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            } else if (e.code === 'Escape') {
                resetGame();
            }
        });
        
        canvas.addEventListener('click', flap);
        
        // Start game loop
        gameLoop();
    </script>
</body>
</html>
